name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate marketplace.json
        run: |
          jq -e '.name and .owner.name and (.plugins | type == "array")' \
            .claude-plugin/marketplace.json
      - name: Validate each plugin entry has required fields
        run: |
          jq -e '.plugins[] | .name and .source and .description' \
            .claude-plugin/marketplace.json
